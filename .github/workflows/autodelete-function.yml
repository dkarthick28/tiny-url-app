name: Deploy TinyUrl AutoDelete Function

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build Function
        run: dotnet publish TinyUrl.AutoDelete/TinyUrl.AutoDelete.csproj -c Release -o publish

      - name: Deploy to Azure Function
        uses: Azure/functions-action@v1
        with:
          app-name: TinyUrlDelete
          package: ./publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}